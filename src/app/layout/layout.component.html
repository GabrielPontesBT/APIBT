@if (!isHome) {
  <app-navbar></app-navbar>
}

<div class="main-container" [class.main-container--home]="isHome" [class.sidebar-collapsed]="sidebarCollapsed">
  @if (!isHome) {
    <app-sidebar
      [collapsed]="sidebarCollapsed"
    (toggleSidebar)="sidebarCollapsed = !sidebarCollapsed"></app-sidebar>
  }

  <main class="content-area" [class.content-area--home]="isHome">
    <router-outlet (activate)="onChildActivate($event)"></router-outlet>
  </main>
</div>
