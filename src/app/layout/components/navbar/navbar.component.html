<nav class="navbar">

  <img class="logo logo--light" (click)="goHome()" src="assets/image/logo-Bantotal-negro.png" alt="Logo">
  <img class="logo logo--dark"  (click)="goHome()" src="assets/image/logo-Bantotal-blanco.png" alt="Logo">

  <div class="right-section">

    @if (showReleases) {
    <div class="releases-menu" (click)="$event.stopPropagation()">
      <button class="releases-btn" (click)="toggleReleases($event)"
        [class.active]="releasesOpen || isOnReleasePage">
        Releases
        <span class="material-icons releases-arrow"
          [class.open]="releasesOpen">expand_more</span>
      </button>
      @if (releasesOpen) {
        <div class="releases-dropdown">
          @for (r of releases; track r.id) {
            <a class="releases-item"
              [routerLink]="['/', activeVersion, 'releases', r.id]"
              routerLinkActive="releases-item--active"
              (click)="closeReleases()">
              {{ r.titulo }}
            </a>
          }
        </div>
      }
    </div>
    }

    <button class="toggle-theme-button"
            [class.rotate]="rotate"
            (click)="toggleTheme()"
            title="Cambiar tema">
      <span class="material-icons">
        {{ isDarkMode ? 'dark_mode' : 'light_mode' }}
      </span>
    </button>

    <app-search-box (searchFocused)="closeReleases()"></app-search-box>

  </div>
</nav>
