<button
  class="scroll-to-top"
  [class.is-visible]="visible"
  (click)="scrollToTop()"
  aria-label="Volver arriba"
  title="Volver arriba"
>
  <svg
    xmlns="http://www.w3.org/2000/svg"
    viewBox="4 6 16 12"
    fill="none"
    stroke="currentColor"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
    class="scroll-to-top__icon"
  >
    <polyline points="18 15 12 9 6 15"></polyline>
  </svg>
</button>
