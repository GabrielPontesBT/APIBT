<!-- Botón flotante tipo pill -->
<div class="chat-bubble" (click)="toggleChat()">
  <div class="chat-bubble-inner">
    <span class="chat-bubble-text">Asistente IA</span>
    <div class="chat-bubble-icon-wrapper">
      <img src="../../../../../assets/image/chat-icon.png" class="chat-img" />
    </div>
  </div>
</div>

<!-- Panel deslizante desde abajo -->
@if (renderChat) {
  <div class="chat-sheet" [@slideUp]>

    <div class="sheet-header">
      <span class="sheet-title">Asistente IA</span>
      <div class="sheet-actions">
        <button class="sheet-btn" title="Minimizar" (click)="toggleChat()">
          <span class="material-icons">expand_more</span>
        </button>
        <button class="sheet-btn" title="Borrar historial" (click)="clearChatHistory()">
          <span class="material-icons">history</span>
        </button>
      </div>
    </div>

    <div class="chat-messages" #chatMessages>
      @for (m of messagesHTML; track m) {
        <div
          [ngClass]="{ 'user-message': m.isUser, 'bot-message': !m.isUser }"
          [@messageAnim]="m.isUser ? true : null">
          <span [innerHTML]="m.text"></span>
        </div>
      }
    </div>

    <div class="chat-input">
      <div class="chat-input-wrapper">
        <input #inputRef [(ngModel)]="inputMessage" (keydown.enter)="sendMessage()" [disabled]="loading"
          placeholder="Escribe un mensaje..." />
        <button class="send-btn" (click)="sendMessage()" [disabled]="loading">
          <span class="material-icons">send</span>
        </button>
      </div>
    </div>

  </div>
}
