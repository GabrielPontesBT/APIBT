<!--
search-box.component.html
*
* Renderiza un buscador de documentación con resultados en vivo, permitiendo
* escribir una consulta, visualizar coincidencias relevantes y navegar a la
* página seleccionada sin cargar manualmente la ruta.
-->

<div class="search-wrapper" (click)="$event.stopPropagation()">

  @if (isFocused) {
    <div class="blur-overlay" (click)="clearResults()"></div>
  }

  <div class="input-wrapper">
    <svg
      xmlns="http://www.w3.org/2000/svg"
      class="search-icon"
      viewBox="0 0 1024 1024"
      fill="currentColor"
      aria-label="search icon"
    >
      <path
        d="M192 480a256 256 0 1 1 512 0 256 256 0 0 1-512 0m631.776 362.496-143.2-143.168A318.464 318.464 0 0 0 768 480c0-176.736-143.264-320-320-320S128 303.264 128 480s143.264 320 320 320a318.016 318.016 0 0 0 184.16-58.592l146.336 146.368c12.512 12.48 32.768 12.48 45.28 0 12.48-12.512 12.48-32.768 0-45.28"
      ></path>
    </svg>
    <input
      type="text"
      [(ngModel)]="query"
      (input)="search()"
      (focus)="isFocused = true; searchFocused.emit()"
      placeholder="Buscar..."
    />
  </div>

  <!-- Historial de búsquedas recientes -->
  @if (showHistory) {
    <ul class="search-popup history-popup" (click)="$event.stopPropagation()">
      <li class="history-label">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="history-label-icon">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        Búsquedas recientes
      </li>
      @for (term of recentSearches; track term) {
        <li class="history-item">
          <button class="history-btn" (click)="searchFromHistory(term)">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="history-icon">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
            <span>{{ term }}</span>
          </button>
          <button class="remove-history" (click)="removeFromHistory(term, $event)" aria-label="Eliminar búsqueda">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </li>
      }
    </ul>
  }

  <!-- Resultados de búsqueda -->
  @if (searchDone && results.length > 0) {
    <ul class="search-popup" (click)="$event.stopPropagation()">
      @for (r of results; track r.url) {
        <li class="search-result">
          <button (click)="goTo(r.url)" class="link-button"
            [innerHTML]="safeHtml(r.highlightedBreadcrumb)">
          </button>
          <p class="snippet" [innerHTML]="safeHtml(r.highlightedPubName)"></p>
        </li>
      }
    </ul>
  }

  @if (searchDone && !results.length) {
    <p class="search-popup" (click)="$event.stopPropagation()">
      No se encontraron resultados.
    </p>
  }

</div>
