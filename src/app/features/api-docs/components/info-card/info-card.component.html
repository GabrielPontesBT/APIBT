<mat-card class="info-card">
  <div class="info-card_content">
    @if (description) {
      <div class="info-card_description" (click)="onDescriptionClick($event)">
        <span><strong [innerHTML]="description"></strong></span>
      </div>
    }

    @if (pubName) {
      <div class="info-card_block">
        <span><strong>Nombre de publicación: </strong>{{ pubName }}</span>
      </div>
    }

    <div class="info-card_row">
      @if (module) {
        <div class="info-card_block">
          <span><strong>Módulo: </strong>{{ module }}</span>
        </div>
      }

      @if (programa) {
        <div class="info-card_block">
          <span><strong>Programa: </strong>{{ programa }}</span>
        </div>
      }

      @if (scope) {
        <div class="info-card_block">
          <span><strong>Alcance: </strong>{{ scope }}</span>
        </div>
      }
    </div>
  </div>
</mat-card>
