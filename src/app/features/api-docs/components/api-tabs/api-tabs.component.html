<mat-tab-group class="api-tabs" disableRipple animationDuration="0ms">
  @for (tab of tabs; track tab.key) {
    <mat-tab [label]="tab.label">
      @if (tab.rows.length > 0) {
        <app-api-table [columns]="tab.columns" [data]="tab.rows"></app-api-table>
      } @else if (tab.text) {
        <p class="no-aplica">{{ tab.text }}</p>
      } @else {
        <p class="no-aplica">No aplica</p>
      }
    </mat-tab>
  }
</mat-tab-group>
