
<!-- Si hay datos, muestro encabezado y cuerpo -->
@if (data.length > 0) {
  <table [class.wide-second-col]="wideSecondCol" (mousedown)="$event.stopPropagation()">
    <thead>
      <tr>
        @for (col of columns; track col) {
          <th>{{ col }}</th>
        }
      </tr>
    </thead>
    <tbody>
      <!-- Modo columnas o dinámico -->
      @if (columns.length > 0) {
        @for (row of data; track row) {
          <tr>
            @for (col of columns; track col) {
              <td
                [innerHTML]="safeHtml(row[col])">
              </td>
            }
          </tr>
        }
      } @else {
        @for (row of data; track row) {
          <tr>
            <th>{{ row.campo }}</th>
            <td>{{ row.valor }}</td>
          </tr>
        }
      }
    </tbody>
  </table>
} @else {
  <tbody>
    <tr>
      <td [attr.colspan]="columns.length || 1" class="text-center">
        No aplica.
      </td>
    </tr>
  </tbody>
}

<!-- Si NO hay datos, solo un tbody con “No aplica” -->
