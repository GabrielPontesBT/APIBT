@if (types.length > 0) {
  <h1 class="vals-title" [id]="types.length === 1 ? 'valores' : null">
    Valores
  </h1>
  <div class="mat-accordion-BT">
    @for (group of types; track group; let i = $index) {
      <mat-expansion-panel
        [expanded]="expandedMap[i]">
        <mat-expansion-panel-header>
          <mat-panel-title
            [id]="types.length === 1 ? 'valores' : 'valores' + (i + 1)">
            {{ group.elementValName }}
          </mat-panel-title>
        </mat-expansion-panel-header>
        @if (group.description) {
          <p>{{ group.description }}</p>
        }
        <app-api-table
          [columns]="group.listHeader.split(',')"
          [data]="group.fields">
        </app-api-table>
      </mat-expansion-panel>
    }
  </div>
}
